name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: |
          set -o pipefail
          go test -race -covermode=atomic -coverprofile=coverage.out ./... | tee coverage.log
          awk '/coverage:/ {
            coverage = $0
            sub(/^.*coverage: /, "", coverage)
            sub(/%.*/, "", coverage)
            score = coverage + 0
            if (score <= 80) {
              print "package coverage must be greater than 80%: " $0
              failed = 1
            }
          } END { exit failed }' coverage.log

      - name: Check coverage
        run: |
          coverage="$(go tool cover -func=coverage.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')"
          awk -v coverage="$coverage" 'BEGIN { exit !(coverage > 80) }'
